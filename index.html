<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✏️ 페이지 제목 변경 -->
  <title>꿀템 링크 모음</title>
  <meta name="description" content="쿠팡 꿀템 링크 모음" />
  <style>
    /* ── 기본 리셋 & 변수 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --border:    #e5e7eb;
      --text:      #111827;
      --sub:       #6b7280;
      --arrow:     #9ca3af;
      --radius:    14px;
      --shadow:    0 2px 8px rgba(0,0,0,.07);
      --shadow-h:  0 4px 16px rgba(0,0,0,.12);
      --accent:    #ff4747;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #0f0f0f;
        --surface:  #1c1c1e;
        --border:   #2c2c2e;
        --text:     #f2f2f7;
        --sub:      #8e8e93;
        --arrow:    #48484a;
        --shadow:   0 2px 8px rgba(0,0,0,.4);
        --shadow-h: 0 4px 16px rgba(0,0,0,.6);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 0 16px 48px;
    }

    /* ── 레이아웃 래퍼 ── */
    .wrapper {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── 프로필 영역 ── */
    .profile {
      text-align: center;
      padding: 40px 0 28px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    /* ✏️ 닉네임 스타일 (텍스트는 JS 배열 상단 CONFIG에서 변경) */
    .nickname {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
      margin-bottom: 6px;
    }

    /* ✏️ 소개문구 스타일 */
    .bio {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.6;
    }

    /* ── 카테고리 섹션 ── */
    .section { margin-bottom: 28px; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── 링크 버튼 ── */
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .link-btn:hover {
      box-shadow: var(--shadow-h);
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: scale(.97);
      box-shadow: var(--shadow);
    }

    /* 이모지 아이콘 */
    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    /* 색상 테마 */
    .color-red    { background: #fff1f1; }
    .color-orange { background: #fff7ed; }
    .color-yellow { background: #fefce8; }
    .color-green  { background: #f0fdf4; }
    .color-blue   { background: #eff6ff; }
    .color-purple { background: #faf5ff; }
    .color-pink   { background: #fdf2f8; }
    .color-gray   { background: #f9fafb; }

    @media (prefers-color-scheme: dark) {
      .color-red    { background: #3b1212; }
      .color-orange { background: #3b2000; }
      .color-yellow { background: #312e00; }
      .color-green  { background: #0f2e1a; }
      .color-blue   { background: #0c1f3b; }
      .color-purple { background: #1e1040; }
      .color-pink   { background: #2e0f26; }
      .color-gray   { background: #1e1e1e; }
    }

    /* 텍스트 영역 */
    .btn-text { flex: 1; min-width: 0; }

    .btn-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-sub {
      font-size: 12px;
      color: var(--sub);
    }

    /* 뱃지 + 화살표 */
    .btn-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: .4px;
    }

    .badge-HOT  { background: #ff4747; color: #fff; }
    .badge-NEW  { background: #3b82f6; color: #fff; }
    .badge-SALE { background: #f97316; color: #fff; }

    .arrow {
      color: var(--arrow);
      font-size: 16px;
      font-weight: 300;
    }

    /* ── 면책 문구 ── */
    .disclaimer {
      margin-top: 36px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--sub);
      line-height: 1.7;
      text-align: center;
    }

    .disclaimer strong {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text);
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- 프로필 (JS CONFIG에서 수정) -->
  <div class="profile">
    <div class="avatar" id="js-avatar"></div>
    <div class="nickname" id="js-nickname"></div>
    <div class="bio" id="js-bio"></div>
  </div>

  <!-- 링크 버튼들이 여기에 렌더링됨 -->
  <div id="js-links"></div>

  <!-- 쿠팡파트너스 필수 면책 문구 -->
  <div class="disclaimer">
    <strong>📢 파트너스 활동 안내</strong>
    이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
    구매자에게 추가 비용이 발생하지 않으며, 상품 가격·재고·배송 정보는 실시간으로 변동될 수 있습니다.
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   ✏️ 프로필 설정 — 여기서 닉네임·소개·아바타 변경
   ═══════════════════════════════════════════════ */
const CONFIG = {
  avatar:   "🛒",          // ✏️ 아바타 이모지 변경
  nickname: "꿀템 큐레이터", // ✏️ 닉네임 변경
  bio:      "직접 써보고 추천하는 쿠팡 진짜 꿀템 모음\n최저가·로켓배송 위주로 골랐어요 🚀", // ✏️ 소개문구 변경 (\n 줄바꿈)
};

/* ═══════════════════════════════════════════════
   ✏️ 상품 데이터 — 이 배열만 수정하면 버튼 자동 생성
   ═══════════════════════════════════════════════

   필드 설명:
     category : 섹션 제목 (같은 문자열끼리 그룹핑)
     emoji    : 버튼 아이콘 이모지
     color    : 아이콘 배경색 (red/orange/yellow/green/blue/purple/pink/gray)
     title    : ✏️ 상품명 변경 위치
     sub      : ✏️ 부제목 (배송정보·특징 등)
     badge    : "HOT" | "NEW" | "SALE" | "" (뱃지 없으면 빈 문자열)
     url      : ✏️ 쿠팡 링크 삽입 위치 (href="여기에 링크")

   버튼 추가 방법 : 아래 배열에 객체 하나 추가 { ... },
   버튼 삭제 방법 : 해당 객체 줄 전체 삭제
   ═══════════════════════════════════════════════ */
const products = [
  {
    category: "🔥 이번주 인기 꿀템",
    emoji:    "🏠",
    color:    "red",
    title:    "요즘 난리난 주방 정리템",
    sub:      "쿠팡 최저가 · 로켓배송",
    badge:    "HOT",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "🔥 이번주 인기 꿀템",
    emoji:    "🧴",
    color:    "orange",
    title:    "피부과 추천 보습크림",
    sub:      "1+1 행사중 · 무료배송",
    badge:    "SALE",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "🆕 신규 입고",
    emoji:    "💻",
    color:    "blue",
    title:    "초경량 노트북 거치대",
    sub:      "알루미늄 소재 · 각도 조절",
    badge:    "NEW",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "🆕 신규 입고",
    emoji:    "🎧",
    color:    "purple",
    title:    "노캔 무선 이어폰",
    sub:      "30시간 재생 · 로켓배송",
    badge:    "NEW",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "💰 가성비 추천",
    emoji:    "🪑",
    color:    "green",
    title:    "허리 지키는 메쉬 의자",
    sub:      "허리받침 조절 · 조립 쉬움",
    badge:    "",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "💰 가성비 추천",
    emoji:    "☕",
    color:    "yellow",
    title:    "캡슐커피 머신 입문용",
    sub:      "호환 캡슐 다양 · 소형",
    badge:    "SALE",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
  {
    category: "💰 가성비 추천",
    emoji:    "🧹",
    color:    "pink",
    title:    "무선 청소기 가성비 끝판왕",
    sub:      "흡입력 강력 · 배터리 40분",
    badge:    "",
    url:      "" // ✏️ 쿠팡 링크 여기에 삽입
  },
];

/* ── 렌더링 (수정 불필요) ── */
document.getElementById("js-avatar").textContent   = CONFIG.avatar;
document.getElementById("js-nickname").textContent = CONFIG.nickname;
document.getElementById("js-bio").innerHTML =
  CONFIG.bio.replace(/\n/g, "<br>");

// 카테고리별로 그룹핑
const grouped = products.reduce((acc, item) => {
  (acc[item.category] = acc[item.category] || []).push(item);
  return acc;
}, {});

const container = document.getElementById("js-links");

Object.entries(grouped).forEach(([cat, items]) => {
  const section = document.createElement("div");
  section.className = "section";

  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = cat;
  section.appendChild(title);

  items.forEach(p => {
    const a = document.createElement("a");
    a.className = "link-btn";
    a.href      = p.url || "#";
    a.target    = "_blank";
    a.rel       = "noopener noreferrer sponsored";

    // 링크가 비어있으면 클릭 방지 (개발 편의)
    if (!p.url) {
      a.href = "#";
      a.addEventListener("click", e => e.preventDefault());
    }

    a.innerHTML = `
      <div class="btn-icon color-${p.color}">${p.emoji}</div>
      <div class="btn-text">
        <div class="btn-title">${p.title}</div>
        <div class="btn-sub">${p.sub}</div>
      </div>
      <div class="btn-right">
        ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge}</span>` : ""}
        <span class="arrow">›</span>
      </div>
    `;

    section.appendChild(a);
  });

  container.appendChild(section);
});
</script>
</body>
</html>
